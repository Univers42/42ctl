# cargo-deny policy for 42ctl. Advisories are denied (a vulnerable dep fails CI); licenses
# are allowlisted to OSI-permissive + the project's own AGPL; multiple-version warnings are
# tolerated (transitive churn) but unknown registries/git sources are denied.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
  "AGPL-3.0",
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/Univers42/vault42"]
