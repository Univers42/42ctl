# cargo-deny policy for 42ctl. Vulnerability advisories are denied (a vulnerable dep fails CI);
# two *unmaintained* (informational, no-fix) advisories are explicitly ignored with rationale.
# Licenses are allowlisted to OSI-permissive + the project's own AGPL. Wildcard versions are
# tolerated only because our two intra-platform deps are git deps pinned to an immutable tag.

[advisories]
version = 2
yanked = "deny"
ignore = [
  # bincode 1.3.3 (via vault42-core): "unmaintained" — the team declared 1.3.3 feature-complete
  # and ceased development; it is NOT a vulnerability and has no safe upgrade. RUSTSEC-2025-0141.
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is unmaintained-by-choice, not vulnerable; transitive via vault42-core; no safe upgrade" },
  # rustls-pemfile 2.2.0 (via tonic): "unmaintained" — folded into rustls-pki-types; thin wrapper,
  # no vulnerability, no safe upgrade until tonic migrates. RUSTSEC-2025-0134.
  { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile 2.2.0 is unmaintained, not vulnerable; transitive via tonic; no safe upgrade" },
]

[licenses]
version = 2
allow = [
  "AGPL-3.0-only",   # our own crates (c42, vault42-core, vault42-proto)
  "AGPL-3.0",
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CDLA-Permissive-2.0",   # webpki-roots (Mozilla CA list)
]
confidence-threshold = 0.9

[bans]
# Transitive version churn (thiserror 1+2, windows-sys, …) is a warning, not a failure.
multiple-versions = "warn"
# Our vault42-core/-proto git deps carry no version requirement, so cargo-deny sees them as
# wildcards — but they are pinned to an immutable git tag (v0.1.2), so the unpinned-version risk
# the check guards against does not apply. Warn, don't fail.
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/Univers42/vault42"]
