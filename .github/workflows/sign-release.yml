# Cosign + SBOM companion to release.yml (P4/P7).
#
# cargo-dist (release.yml) already emits SHA-256 checksums and SLSA build
# provenance (actions/attest-build-provenance). This workflow adds the explicit
# cosign keyless signature over EVERY release artifact — so the `cosign
# verify-blob` flow in SECURITY.md is real — plus a CycloneDX source SBOM.
#
# Runs AFTER a release is published, GATED behind the protected `publish`
# environment. Keyless: trust is the workflow's GitHub OIDC identity (no key).
#
# Note: `cargo install c42` from crates.io is NOT a channel — c42 depends on
# vault42-core/-proto via git, which crates.io forbids; the `cargo` channel is
# `cargo binstall c42` (pulls the signed GitHub Release binary). See DECISIONS.
#
# P7-hardened: actions pinned by commit SHA (re-pin with `pinact run`).
name: sign-release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sign (e.g. v0.2.0)"
        required: true

permissions:
  contents: write   # upload .sig/.pem/SBOM back onto the release
  id-token: write   # cosign keyless (Fulcio/Rekor via OIDC)

concurrency:
  group: sign-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cosign-sign-assets:
    runs-on: ubuntu-latest
    environment: publish
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Download release assets
        run: |
          mkdir -p assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir assets --pattern '*' --skip-existing

      - name: cosign sign-blob each artifact (keyless)
        working-directory: assets
        run: |
          for f in *; do
            case "$f" in *.sig|*.pem|*.sbom.json) continue ;; esac
            [ -f "$f" ] || continue
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done

      - name: Generate CycloneDX SBOM (source)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: assets/42ctl-${{ env.TAG }}.sbom.json

      - name: Upload signatures + SBOM to the release
        working-directory: assets
        run: |
          gh release upload "$TAG" *.sig *.pem *.sbom.json \
            --repo "$GITHUB_REPOSITORY" --clobber
