# CI for 42ctl — must be green to merge. Lint, test, supply-chain scan, and a no-push
# Docker build. P7-hardened: every action pinned by commit SHA, least-privilege token,
# no credential persistence, and per-ref concurrency. Re-pin SHAs with `pinact run`.
name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  supply-chain:
    name: audit + deny + gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-audit,cargo-deny
      - run: cargo audit
      - run: cargo deny check
      # Run the OSS gitleaks BINARY (MIT), not gitleaks-action — the action
      # paywalls organization repos. Download is checksum-verified before use.
      - name: gitleaks (secret scan)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$base/$asset" -o "$asset"
          curl -sSfL "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep " $asset\$" checksums.txt | sha256sum -c -
          tar xzf "$asset" gitleaks
          ./gitleaks dir . --no-banner --redact --exit-code 1

  docker:
    name: docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: 42ctl:ci
          build-args: |
            FT_GIT_SHA=${{ github.sha }}
